<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <title>Live Control Panel</title>
</head>
<body style="font-family: sans-serif; padding: 20px; max-width: 1200px; margin: 0 auto;">
    <h1>🛢️ Oakland Data Lake Control Panel (Live Stream)</h1>
    <div id="status" style="color: orange; font-weight: bold;">Status: Connecting...</div>
    <hr>

    <h2>1. Add New Asset Monitored</h2>
    <input type="text" id="ticker" placeholder="Ticker (e.g. AAPL)">
    <input type="text" id="name" placeholder="Company Name">
    <button onclick="sendAction('add')">Add Ticker</button>
    <button onclick="sendAction('sync')" style="margin-left: 20px; background: #e1f5fe;">🔄 Run Active Sync Pipelines</button>

    <hr>

    <div style="display: flex; gap: 40px;">
        <div style="flex: 1;">
            <h3>📋 Currently Tracked Tickers</h3>
            <table border="1" cellpadding="5" style="width: 100%; border-collapse: collapse;">
                <thead><tr style="background: #f5f5f5;"><th>Ticker</th><th>Name</th><th>Action</th></tr></thead>
                <tbody id="stocks-list"></tbody>
            </table>
        </div>

        <div style="flex: 2;">
            <h3>🏆 All-Time High Records (Max Day)</h3>
            <table border="1" cellpadding="5" style="width: 100%; border-collapse: collapse; margin-bottom: 20px;">
                <thead><tr style="background: #f5f5f5;"><th>Ticker</th><th>Date</th><th>Peak High</th><th>Close</th><th>Volume</th></tr></thead>
                <tbody id="max-day-body"></tbody>
            </table>

            <h3>⏱️ Chronological Price Logs</h3>
            <table border="1" cellpadding="5" style="width: 100%; border-collapse: collapse;">
                <thead><tr style="background: #f5f5f5;"><th>Ticker</th><th>Date</th><th>Open</th><th>High</th><th>Low</th><th>Close</th></tr></thead>
                <tbody id="recent-prices-body"></tbody>
            </table>
        </div>
    </div>

    <script>
        const wsProtocol = window.location.protocol === "https:" ? "wss://" : "ws://";
        const wsUrl = wsProtocol + window.location.host + "/control-panel/ws";
        let ws = new WebSocket(wsUrl);

        ws.onopen = () => {
            document.getElementById('status').innerText = "Status: Live Subscribed 🟢";
            document.getElementById('status').style.color = "green";
        };

        ws.onclose = () => {
            document.getElementById('status').innerText = "Status: Connection Closed 🔴";
            document.getElementById('status').style.color = "red";
        };

        ws.onmessage = (event) => {
            const data = JSON.parse(event.data);
            
            document.getElementById('stocks-list').innerHTML = data.stocks.map(s => `
                <tr>
                    <td><strong>${s.ticker}</strong></td>
                    <td>${s.company_name}</td>
                    <td><button onclick="sendAction('untrack', '${s.ticker}')">Remove</button></td>
                </tr>
            `).join('');

            document.getElementById('max-day-body').innerHTML = data.max_days.map(r => `
                <tr>
                    <td><strong>${r.ticker}</strong></td>
                    <td>${r.price_date}</td>
                    <td style="color: green; font-weight: bold;">$${parseFloat(r.high_price).toFixed(2)}</td>
                    <td>$${parseFloat(r.close_price).toFixed(2)}</td>
                    <td>${parseInt(r.volume).toLocaleString()}</td>
                </tr>
            `).join('');

            document.getElementById('recent-prices-body').innerHTML = data.history.map(r => `
                <tr>
                    <td>${r.ticker}</td>
                    <td>${r.price_date}</td>
                    <td>$${parseFloat(r.open_price).toFixed(2)}</td>
                    <td>$${parseFloat(r.high_price).toFixed(2)}</td>
                    <td>$${parseFloat(r.low_price).toFixed(2)}</td>
                    <td><strong>$${parseFloat(r.close_price).toFixed(2)}</strong></td>
                </tr>
            `).join('');
        };

        async function sendAction(type, targetTicker = '') {
            let body = {};
            if (type === 'add') {
                body = { 
                    ticker: document.getElementById('ticker').value, 
                    company_name: document.getElementById('name').value 
                };
                if(!body.ticker || !body.company_name) return alert('Missing values');
            }
            
            const urlMap = {
                'add': '/control-panel/api/v1/control/stocks',
                'untrack': `/control-panel/api/v1/control/stocks/untrack/${targetTicker}`,
                'sync': '/control-panel/api/v1/control/stocks/sync'
            };

            await fetch(urlMap[type], {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: type === 'add' ? JSON.stringify(body) : null
            });

            if(type === 'add') {
                document.getElementById('ticker').value = '';
                document.getElementById('name').value = '';
            }
        }
    </script>
</body>
</html>
