<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Oakland Data Platform{% endblock %}</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: { extend: { colors: { slate: { 850: '#151e2e', 900: '0f172a' } } } }
        }
    </script>
    <style>
        ::-webkit-scrollbar { height: 8px; width: 8px; }
        ::-webkit-scrollbar-track { background: #1e293b; }
        ::-webkit-scrollbar-thumb { background: #475569; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #64748b; }
    </style>
</head>
<body class="bg-slate-900 text-slate-100 min-h-screen flex flex-col font-sans selection:bg-sky-500 selection:text-white">
    
    <nav class="bg-slate-850 border-b border-slate-800 shadow-sm sticky top-0 z-50">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 h-16 flex items-center justify-between">
            <div class="flex items-center space-x-3">
                <span class="text-2xl">🛢️</span>
                <span class="font-bold text-lg tracking-tight text-white">Oakland<span class="text-sky-400">Data</span></span>
            </div>
            <div class="flex space-x-6">
                <a href="/control-panel" class="text-sm font-medium text-slate-300 hover:text-sky-400 transition-colors">Live Control Panel</a>
                <a href="/data-viewer" class="text-sm font-medium text-slate-300 hover:text-sky-400 transition-colors">Data Viewer</a>
                <a href="/pipeline-deck" class="text-sm font-medium text-slate-300 hover:text-sky-400 transition-colors bg-slate-800 px-3 py-1 rounded-md border border-slate-700">Lineage Deck</a>
            </div>
        </div>
    </nav>

    <main class="flex-grow w-full max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8">
        {% block content %}{% endblock %}
    </main>

    <footer class="bg-slate-900 border-t border-slate-800 py-6 mt-auto">
        <div class="max-w-7xl mx-auto px-4 text-center text-sm text-slate-500 flex justify-between items-center">
            <span>Medallion Architecture Sandbox</span>
            <span>Built for Oakland Final Interview</span>
        </div>
    </footer>

    {% block scripts %}{% endblock %}
</body>
</html>
