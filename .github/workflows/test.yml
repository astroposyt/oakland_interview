name: Continuous Integration (Test Suite)

on:
  push:
    branches: [ main, dev ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
        cache: 'pip' # Speeds up subsequent workflow runs

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Run Pytest
      env:
        USE_MOCK_API: "true" # Forces tests to use local mock data, avoiding external API calls
        DATABASE_URL: "postgresql://postgres:postgres@localhost:5432/my_stock_db"
      run: |
        pytest