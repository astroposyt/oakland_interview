name: Continuous Deployment (Live VM)

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    # needs: test 

    steps:
    - name: SSH into VM and Pull Latest Code
      uses: appleboy/ssh-action@v1.0.3
      with:
        host: ${{ secrets.SSH_HOST }}
        username: ${{ secrets.SSH_USERNAME }}
        key: ${{ secrets.SSH_PRIVATE_KEY }}
        port: 22
        script: |
          # 1. Install Docker dynamically if missing
          if ! [ -x "$(command -v docker)" ]; then
            echo "🐳 Docker not found. Installing..."
            sudo apt-get update -y
            sudo apt-get install -y docker.io docker-compose-v2 git
            sudo systemctl start docker
            sudo systemctl enable docker
          fi

          # 2. Establish project folder pathway
          PROJECT_DIR="/home/${{ secrets.SSH_USERNAME }}/oakland-pipeline"
          if [ ! -d "$PROJECT_DIR" ]; then
            echo "📁 Creating project directory and cloning repo..."
            # Automatically resolves your exact GitHub path
            git clone https://github.com/${{ github.repository }}.git $PROJECT_DIR
          fi

          # 3. Pull newest changes and update application images
          cd $PROJECT_DIR
          git pull origin main
          docker compose up -d --build