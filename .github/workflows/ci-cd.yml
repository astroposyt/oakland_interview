name: Continuous Integration & Deployment (CI/CD)

on:
  push:
    branches: [ main, dev ]
  pull_request:
    branches: [ main ]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  test:
    name: Run Test Suite
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: my_stock_db
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
    - name: Checkout repository code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
        cache: 'pip'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        sudo apt-get update && sudo apt-get install -y postgresql-client

    - name: Initialize Database Schema
      env:
        PGPASSWORD: postgres
      run: |
        psql -h localhost -U postgres -d my_stock_db -f init.sql

    - name: Run Pytest
      env:
        USE_MOCK_API: "true"
        DATABASE_URL: "postgresql://postgres:postgres@localhost:5432/my_stock_db"
      run: |
        pytest


  deploy:
    name: Live VM Deployment
    runs-on: ubuntu-latest
    needs: test 

    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
    - name: SSH into VM and Pull Latest Code
      uses: appleboy/ssh-action@v1.0.3
      with:
        host: ${{ secrets.SSH_HOST }}
        username: ${{ secrets.SSH_USERNAME }}
        key: ${{ secrets.SSH_PRIVATE_KEY }}
        port: 22
        script: |
          # 1. Install Docker dynamically if missing
          if ! [ -x "$(command -v docker)" ]; then
            echo "🐳 Docker not found. Installing..."
            sudo apt-get update -y
            sudo apt-get install -y docker.io docker-compose-v2 git
            sudo systemctl start docker
            sudo systemctl enable docker
          fi

          # 2. Establish project folder pathway
          PROJECT_DIR="/home/${{ secrets.SSH_USERNAME }}/oakland-pipeline"
          if [ ! -d "$PROJECT_DIR" ]; then
            echo "📁 Creating project directory and cloning repo..."
            git clone https://github.com/${{ github.repository }}.git $PROJECT_DIR
          fi

          # 3. Pull newest changes and update application images
          cd $PROJECT_DIR
          git pull origin main
          docker compose up -d --build